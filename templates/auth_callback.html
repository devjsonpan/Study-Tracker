<!DOCTYPE html>
<html>
<head>
    <title>Signing in...</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #f8fafc;
        }
        .spinner-wrap {
            text-align: center;
        }
        .spinner {
            width: 42px;
            height: 42px;
            border: 3px solid rgba(99,102,241,0.2);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 18px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        p { color: #94a3b8; font-size: 15px; margin: 0; }
        .error-msg {
            color: #f87171;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="spinner-wrap">
        <div class="spinner" id="spinner"></div>
        <p id="status-text">Signing you in...</p>
        <div class="error-msg" id="error-msg"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = '{{ supabase_url }}';
        const SUPABASE_ANON_KEY = '{{ supabase_anon_key }}';

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: { flowType: 'implicit' }
        });

        async function handleCallback() {
            try {
                // Implicit flow: token arrives in hash fragment, getSession handles it
                const { data, error } = await supabaseClient.auth.getSession();
                if (error) throw error;

                const session = data.session;
                if (!session) {
                    // Small delay then retry in case SDK needs a tick to parse the hash
                    await new Promise(r => setTimeout(r, 500));
                    const { data: data2, error: error2 } = await supabaseClient.auth.getSession();
                    if (error2) throw error2;
                    if (!data2.session) throw new Error('No session found. The sign-in may have expired — please try again.');
                    return finishLogin(data2.session.access_token);
                }
                return finishLogin(session.access_token);
            } catch (err) {
                showError('Sign-in failed: ' + err.message);
            }
        }

        async function finishLogin(accessToken) {
            try {
                const resp = await fetch('/auth/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ access_token: accessToken })
                });

                if (resp.ok) {
                    window.location.href = '/home';
                } else {
                    let errStr = 'Login failed.';
                    try {
                        const data = await resp.json();
                        errStr = data.error || errStr;
                    } catch (e) {
                        errStr += ' Backend returned ' + resp.status;
                    }
                    showError(errStr);
                }
            } catch (err) {
                showError('Network error: ' + err.message);
            }
        }

        function showError(msg) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('status-text').textContent = 'Something went wrong';
            const errEl = document.getElementById('error-msg');
            errEl.textContent = msg;
            errEl.style.display = 'block';
        }

        handleCallback().catch(err => {
            showError('Unhandled error: ' + err.message);
        });
    </script>
</body>
</html>
